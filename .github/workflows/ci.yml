name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go build ./...
      - run: go vet ./...

  self-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        id: tokens

      - name: Verify outputs
        run: |
          echo "Tokens: ${{ steps.tokens.outputs.tokens }}"
          echo "Percentage: ${{ steps.tokens.outputs.percentage }}"
          echo "Badge: ${{ steps.tokens.outputs.badge }}"
          test -n "${{ steps.tokens.outputs.tokens }}"
